services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hcm
    ports:
      - "5432:5432"
    volumes:
      - hcm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      PORT: 8080
      GIN_MODE: release
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: hcm
      DB_SSLMODE: disable
      JWT_SECRET: change-me-in-production
      JWT_EXPIRY_HOURS: 24
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  # Run once to seed demo tenants/users.
  # Use:  docker compose run --rm seed
  seed:
    build:
      context: ./backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: hcm
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/seed"]
    profiles: ["tools"]

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  hcm_pg_data:
